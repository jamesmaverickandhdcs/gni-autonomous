name: GNI MAD Pipeline

# GNI-R-110: MAD runs 30 minutes after main pipeline
# This guarantees the Groq TPM window is completely cleared
# and daily token budget has recovered before MAD starts.
#
# Main pipeline: 02:00 UTC + 10:00 UTC
# MAD pipeline:  02:30 UTC + 10:30 UTC  (30 min later)
#
# Why 30 minutes:
#   - Groq TPM window (60s) clears in 1 min -- but daily budget needs more
#   - 30 min gap is future-proof even if CI runs are re-enabled
#   - If MAD still hits 429 inside this pipeline, add sleep inside
#     the "Run GNI MAD Pipeline" step (no code change needed)

on:
  schedule:
    - cron: '30 2 * * *'
    - cron: '30 10 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-mad:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser==6.0.12 \
            geopy==2.4.1 \
            supabase \
            python-dotenv \
            groq \
            requests

      - name: Run GNI MAD Pipeline
        run: python ai_engine/mad_runner.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GITHUB_ACTIONS: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
