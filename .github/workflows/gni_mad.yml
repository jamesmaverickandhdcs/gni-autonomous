name: GNI MAD Pipeline

# GNI-R-110: MAD runs 30 minutes after main pipeline
# This guarantees the Groq TPM window is completely cleared
# and daily token budget has recovered before MAD starts.
#
# Main pipeline: 02:13 UTC + 10:13 UTC
# MAD pipeline:  02:43 UTC + 10:43 UTC  (30 min later)
#
# Why 30 minutes:
#   - Groq TPM window (60s) clears in 1 min -- but daily budget needs more
#   - 30 min gap is future-proof even if CI runs are re-enabled
#   - If MAD still hits 429 inside this pipeline, add sleep inside
#     the "Run GNI MAD Pipeline" step (no code change needed)

on:
  schedule:
    - cron: '43 2 * * *'   # 02:43 UTC -- pipeline (02:13) + 30 min
    - cron: '43 10 * * *'  # 10:43 UTC -- pipeline (10:13) + 30 min; inside 09:00-10:45 protection window
    - cron: '13 11 * * *'  # 11:13 UTC -- S61 grounding watch; clear of pipeline (:13), MAD (:43), graph (:58); after evening MAD
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-mad:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # S61: the 11:13 slot is the grounding-watch digest only -- never run MAD there.
    if: github.event.schedule != '13 11 * * *'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser==6.0.12 \
            geopy==2.4.1 \
            supabase \
            python-dotenv \
            groq \
            requests

      - name: Run GNI MAD Pipeline
        run: python ai_engine/mad_runner.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ github.event.schedule == '43 10 * * *' && secrets.GROQ_MAD_EVENING || secrets.GROQ_API_KEY }}
          GNI_MAD_ACCOUNT: ${{ github.event.schedule == '43 10 * * *' && 'evening' || 'morning' }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GROQ_MAD_MODEL: ${{ secrets.GROQ_MAD_MODEL }}
          GITHUB_ACTIONS: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_QSChannel_ID: ${{ secrets.TELEGRAM_QSChannel_ID }}
          TELEGRAM_ADMIN_ID:    ${{ secrets.TELEGRAM_ADMIN_ID }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          MYANMAR_DISPATCH_PAT: ${{ secrets.MYANMAR_DISPATCH_PAT }}
      - name: Alert admin on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${ADMIN}" \
            --data-urlencode "text=⚠️ GNI MAD run FAILED -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN: ${{ secrets.TELEGRAM_ADMIN_ID }}

  grounding-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # S61: fabrication-rate digest (7d) over mad_quality_log.grounding_hits.
    # Runs ONLY on the 11:13 slot (or manual dispatch). Zero Groq calls.
    if: github.event.schedule == '13 11 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            supabase \
            python-dotenv \
            requests

      - name: Run Grounding Watch (7d digest)
        run: python ai_engine/analysis/grounding_watch.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ADMIN_ID: ${{ secrets.TELEGRAM_ADMIN_ID }}
          GITHUB_ACTIONS: "true"
      - name: Alert admin on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${ADMIN}" \
            --data-urlencode "text=⚠️ GNI Grounding Watch FAILED -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN: ${{ secrets.TELEGRAM_ADMIN_ID }}
