name: GNI Adaptive Pipeline

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Trigger reason from heartbeat'
        required: false
        default: 'escalation-delta'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-adaptive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Set up Python
        uses: actions/setup-python@v5.3.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser==6.0.12 \
            geopy==2.4.1 \
            supabase \
            python-dotenv \
            groq \
            requests

      - name: Run adaptive pipeline
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_QSChannel_ID: ${{ secrets.TELEGRAM_QSChannel_ID }}
          TELEGRAM_ADMIN_ID:    ${{ secrets.TELEGRAM_ADMIN_ID }}
          GROQ_API_KEY:         ${{ secrets.GROQ_API_KEY }}
          GITHUB_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GROQ_MODEL:           llama-3.3-70b-versatile
          CEREBRAS_API_KEY:     ${{ secrets.CEREBRAS_API_KEY }}
        run: |
          cd ai_engine
          python adaptive_pipeline.py "${{ github.event.inputs.reason }}"
