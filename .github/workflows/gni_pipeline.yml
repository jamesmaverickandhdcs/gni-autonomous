name: GNI Intelligence Pipeline
on:
  schedule:
    - cron: '13 2 * * *'   # 02:13 UTC -- off :00 to reduce GitHub scheduler drift
    - cron: '13 10 * * *'  # 10:13 UTC -- off :00; 8h spacing preserved
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            feedparser==6.0.12 \
            geopy==2.4.1 \
            supabase \
            python-dotenv \
            groq \
            requests \
            yake \
            rank_bm25 \
            openpyxl
      - name: Run GNI Pipeline
        run: python ai_engine/main.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_GNI_NOT_MAD }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}
          GITHUB_ACTIONS: "true"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_QSChannel_ID: ${{ secrets.TELEGRAM_QSChannel_ID }}
          TELEGRAM_ADMIN_ID:    ${{ secrets.TELEGRAM_ADMIN_ID }}
          VERCEL_BYPASS_SECRET: ${{ secrets.VERCEL_BYPASS_SECRET }}
          TELEGRAM_ADMIN_CHAT_ID: ${{ secrets.TELEGRAM_ADMIN_CHAT_ID }}
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      - name: Alert admin on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${ADMIN}" \
            --data-urlencode "text=⚠️ GNI pipeline run FAILED -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN: ${{ secrets.TELEGRAM_ADMIN_ID }}

  verify-outcomes:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Run once daily after the second pipeline run (10:13 UTC)
    if: github.event.schedule == '13 10 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            supabase \
            python-dotenv \
            requests \
            openpyxl
      - name: Run Outcome Verifier (GPVS)
        run: python ai_engine/analysis/outcome_verifier.py
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_ACTIONS: "true"
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
      - name: Run Debate Prediction Verifier (GPVS)
        run: python ai_engine/analysis/debate_prediction_verifier.py --apply
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GITHUB_ACTIONS: "true"
      - name: Alert admin on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${ADMIN}" \
            --data-urlencode "text=⚠️ GNI GPVS verify run FAILED -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN: ${{ secrets.TELEGRAM_ADMIN_ID }}
