name: GNI Entity Graph
on:
  schedule:
    - cron: '58 2 * * *'   # 02:58 UTC -- after 02:13 pipeline saves articles, 15 min after MAD (02:43)
    - cron: '58 10 * * *'  # 10:58 UTC -- after 10:13 pipeline saves articles, 15 min after MAD (10:43)
  workflow_dispatch:  # Allow manual trigger
jobs:
  entity_graph:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install supabase python-dotenv networkx
      - name: Run GNI Entity Graph Job
        run: |
          cd ai_engine
          python -m analysis.gni_graph_job
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
      - name: Alert admin on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${ADMIN}" \
            --data-urlencode "text=⚠️ GNI entity-graph run FAILED -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN: ${{ secrets.TELEGRAM_ADMIN_ID }}
