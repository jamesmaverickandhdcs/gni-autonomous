name: GNI Mission Control
on:
  schedule:
    - cron: '*/30 * * * *'  # Every 30 minutes
  workflow_dispatch:  # Allow manual trigger
jobs:
  mission_control:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Run GNI Mission Control
        run: |
          curl -s -X GET \
            -H "X-Internal-Key: ${{ secrets.SELF_CHECK_INTERNAL_KEY }}" \
            "${{ secrets.GNI_APP_URL }}/api/mission-control" \
            -o /tmp/mc_response.json
          python3 scripts/mission_control_check.py
        env:
          SELF_CHECK_INTERNAL_KEY: ${{ secrets.SELF_CHECK_INTERNAL_KEY }}
          GNI_APP_URL: ${{ secrets.GNI_APP_URL }}
      - name: Alert admin on failure
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TG}/sendMessage" \
            -d chat_id="${ADMIN}" \
            --data-urlencode "text=⚠️ GNI selfcheck run FAILED -- ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          TG: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ADMIN: ${{ secrets.TELEGRAM_ADMIN_ID }}
